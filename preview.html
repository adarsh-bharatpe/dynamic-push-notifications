<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gold PN — Android preview</title>
  <style>
    /* BharatPe brand colours only: Primary #00B386, Heading #1A1A1A, Body #6B7280, Black #000000, White #FFFFFF */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #2C2C2E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #1A1A1A;
    }
    .phone-frame {
      width: 420px;
      height: 860px;
      background: #000000;
      border-radius: 44px;
      padding: 14px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.4), inset 0 0 0 2px #3A3A3C;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      background: #1C1C1E;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 28px;
      background: #000000;
      color: #FFFFFF;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-bar .time { font-weight: 500; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .status-bar .icons span { opacity: 0.9; }
    .notification-tray {
      flex: 1;
      padding: 12px 12px 24px;
      overflow-y: auto;
      background: #1C1C1E;
    }
    .notification-card {
      background: #2C2C2E;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      border: 1px solid #48484A;
    }
    .notification-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px 12px;
    }
    .notification-app-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      flex-shrink: 0;
      overflow: hidden;
      background: #00B386;
    }
    .notification-app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .notification-title-block {
      flex: 1;
      min-width: 0;
    }
    .notification-app-name {
      font-size: 12px;
      color: #8E8E93;
      margin: 0 0 2px;
      line-height: 1.2;
    }
    .notification-title {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      margin: 0;
      line-height: 1.25;
    }
    .notification-subtitle {
      font-size: 14px;
      color: #8E8E93;
      margin: 3px 0 0;
      line-height: 1.3;
    }
    .notification-time {
      font-size: 11px;
      color: #8E8E93;
      flex-shrink: 0;
    }
    .notification-big-picture {
      width: 100%;
      display: block;
      background: #1C1C1E;
      max-height: 380px;
      object-fit: cover;
      object-position: top;
      border-top: 1px solid #3A3A3C;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <span>📶</span>
          <span>🔋</span>
        </div>
      </div>
      <div class="notification-tray">
        <div class="notification-card">
          <div class="notification-header">
            <!-- Notification icon: Invest BharatPe app (com.twelve.club). No icon on the notification image/banner. -->
            <div class="notification-app-icon"><img src="https://play-lh.googleusercontent.com/OVCnOl9m05h30dVnA0nHG_MAnj_zkBlSN8Ni4Dkw0D1mJDTIWKVVEetaWDht5wZ9ERo=w240-h480-rw" alt="Invest BharatPe" /></div>
            <div class="notification-title-block">
              <p class="notification-app-name">Invest BharatPe</p>
              <p class="notification-title">{{TITLE}}</p>
              <p class="notification-subtitle">{{SUBTITLE}}</p>
            </div>
            <span class="notification-time">now</span>
          </div>
          <img class="notification-big-picture" src="/banner/image" alt="Gold banner" />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
